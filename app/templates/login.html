{% extends "base.html" %}

{% block title %}Login - Roberts Enterprise{% endblock %}

{% block content %}
<div class="row justify-content-center mt-5">
    <div class="col-md-6 col-lg-4 mt-5">
        <div class="text-center mb-4">
            <h2 style="color: #aa8c66; font-weight: 700;">Roberts Enterprise</h2>
            <p class="text-muted">Shop Operations Portal</p>
        </div>

        <div class="card shadow-lg border-0">
            <div class="card-body p-5">
                <form method="POST" action="{{ url_for('login') }}">
                    <div class="mb-3">
                        <label for="email" class="form-label">Email Address</label>
                        <input type="email" class="form-control" id="email" name="email" required
                            autocomplete="username">
                    </div>
                    <div class="mb-4">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" class="form-control" id="password" name="password" required
                            autocomplete="current-password">
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-primary btn-lg">Log In (Demo Bypass)</button>
                    </div>
                </form>
            </div>
        </div>
        <div class="text-center mt-4">
            <a href="#" class="text-muted text-decoration-none small">Forgot password?</a>
        </div>
    </div>
</div>
{% endblock %}
