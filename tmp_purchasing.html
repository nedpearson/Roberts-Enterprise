<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Roberts Enterprise</title>
    <!-- Bootstrap 5 CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.2/font/bootstrap-icons.min.css">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #121212;
            color: #e0e0e0;
        }

        .sidebar {
            background-color: #1e1e1e;
            min-height: 100vh;
            border-right: 1px solid #333;
        }

        .nav-link {
            color: #aaa;
            padding: 0.8rem 1rem;
            border-radius: 6px;
            margin-bottom: 0.2rem;
        }

        .nav-link:hover,
        .nav-link.active {
            background-color: #2d2d2d;
            color: #fff;
        }

        .content-area {
            padding: 2rem;
        }

        .card {
            background-color: #1e1e1e;
            border: 1px solid #333;
        }

        .card-header {
            border-bottom: 1px solid #333;
            background-color: #252525;
        }

        .table {
            color: #e0e0e0;
        }

        .table-dark {
            --bs-table-bg: #1e1e1e;
        }

        .btn-primary {
            background-color: var(--theme-color, #aa8c66);
            border-color: var(--theme-color, #aa8c66);
            color: #fff;
        }

        .btn-primary:hover {
            filter: brightness(0.8);
        }

        .theme-text {
            color: var(--theme-color, #aa8c66) !important;
        }
    </style>

    <!-- Dynamic Theme Injection -->



</head>

<body>

    <div class="container-fluid">
        <div class="row">
            <!-- Sidebar Navigation -->


            <!-- Main Content Area -->
            <main class="col-12 content-area">
                <!-- Flash Messages -->





                <div class="row justify-content-center mt-5">
                    <div class="col-md-6 col-lg-4 mt-5">
                        <div class="text-center mb-4">
                            <h2 style="color: #aa8c66; font-weight: 700;">Roberts Enterprise</h2>
                            <p class="text-muted">Shop Operations Portal</p>
                        </div>

                        <div class="card shadow-lg border-0">
                            <div class="card-body p-5">
                                <form method="POST" action="/login">
                                    <div class="mb-3">
                                        <label for="email" class="form-label">Email Address</label>
                                        <input type="email" class="form-control text-light" id="email" name="email"
                                            style="background-color: #2b2b2b; border-color: #444;"
                                            value="admin@robertsenterprise.com" required>
                                    </div>
                                    <div class="mb-4">
                                        <label for="password" class="form-label">Password</label>
                                        <input type="password" class="form-control text-light" id="password"
                                            name="password" style="background-color: #2b2b2b; border-color: #444;"
                                            value="password" required>
                                    </div>
                                    <div class="d-grid gap-2">
                                        <button type="submit" class="btn btn-primary btn-lg">Log In (Demo
                                            Bypass)</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                        <div class="text-center mt-4">
                            <a href="#" class="text-muted text-decoration-none small">Forgot password?</a>
                        </div>
                    </div>
                </div>

            </main>
        </div>
    </div>

    <!-- Bootstrap JS -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.css"></script>

</body>

</html>
